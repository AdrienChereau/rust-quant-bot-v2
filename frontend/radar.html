<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOKYO — Signal</title>
<style>
:root{--txt:#dfe6ee;--mut:#66738a;--cy:#38e1ff;--vi:#8b7cf7;--gr:#3ddc84;--rd:#ff5252;}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{background:#030509;color:var(--txt);font-family:ui-monospace,'SF Mono',Menlo,monospace;overflow:hidden;cursor:default}
#scene{position:fixed;inset:0;display:block}

/* ── couche éphémère : visible au mouvement, s'évanouit ensuite ── */
#hud{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0;transition:opacity .8s ease}
body.awake #hud{opacity:1;transition:opacity .25s ease}

/* prix fantôme — seule présence permanente, à peine là */
#ghost{position:fixed;top:34px;left:50%;transform:translateX(-50%);z-index:2;text-align:center;
 opacity:.28;transition:opacity .6s;pointer-events:none}
body.awake #ghost{opacity:.9}
#ghost .p{font-size:44px;font-weight:200;letter-spacing:.06em;color:var(--txt)}
#ghost .l{font-size:9px;letter-spacing:.5em;color:var(--mut);margin-top:6px}

#corner{position:absolute;top:26px;left:30px}
#corner .t1{font-size:15px;letter-spacing:.42em;color:var(--cy)}
#corner .t2{font-size:9px;letter-spacing:.24em;color:var(--mut);margin-top:7px}
#status{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--rd);margin-right:7px;vertical-align:1px}
#status.on{background:var(--gr);box-shadow:0 0 9px var(--gr)}

#metrics{position:absolute;left:30px;bottom:30px;display:flex;gap:34px}
.m .k{font-size:8.5px;letter-spacing:.28em;color:var(--mut)}
.m .v{font-size:17px;margin-top:5px;font-weight:300}

#link{position:absolute;top:26px;right:30px;text-align:right}
#link .k{font-size:8.5px;letter-spacing:.28em;color:var(--mut)}
#link .v{font-size:13px;color:var(--vi);margin-top:5px}
#link .s{font-size:10px;color:var(--mut);margin-top:4px}

/* journal complet — au réveil seulement */
#logbox{position:absolute;right:0;bottom:0;width:min(520px,44vw);max-height:34vh;padding:14px 20px 16px;
 background:linear-gradient(160deg,rgba(6,10,17,.35),rgba(6,10,17,.9));
 border-top:1px solid rgba(56,225,255,.14);border-left:1px solid rgba(56,225,255,.14);
 border-top-left-radius:14px;backdrop-filter:blur(10px)}
#logbox .k{font-size:8.5px;letter-spacing:.34em;color:var(--cy);margin-bottom:9px}
#log{font-size:11px;line-height:1.8;overflow:auto;max-height:calc(34vh - 46px)}
#log .t{color:var(--mut);margin-right:9px}
.kill{color:var(--rd)}.ok{color:var(--gr)}.warn{color:#ffb454}

/* toasts éphémères — un événement surgit puis se dissout, même écran endormi */
#toasts{position:fixed;right:26px;bottom:24px;z-index:4;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:none}
.toast{font-size:11.5px;padding:9px 14px;border-radius:9px;max-width:56vw;
 background:rgba(8,12,20,.82);border:1px solid rgba(56,225,255,.22);backdrop-filter:blur(6px);
 animation:toast 7s forwards}
@keyframes toast{0%{opacity:0;transform:translateY(8px)}6%{opacity:1;transform:none}80%{opacity:1}100%{opacity:0;transform:translateY(-6px)}}
body.awake #toasts{opacity:0}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="ghost"><div class="p" id="px">–</div><div class="l">BTC · TOKYO</div></div>
<div id="hud">
  <div id="corner">
    <div class="t1">TOKYO · SIGNAL</div>
    <div class="t2"><span id="status"></span><span id="statustxt">CONNEXION…</span></div>
  </div>
  <div id="link">
    <div class="k">LIAISON UDP ⟶ DUBLIN</div>
    <div class="v" id="rate">0 ticks/s</div>
    <div class="s">seq <span id="seq">0</span> · kills <span id="kills" style="color:var(--rd)">0</span></div>
  </div>
  <div id="metrics">
    <div class="m"><div class="k">DRIFT /s</div><div class="v" id="mdrift">–</div></div>
    <div class="m"><div class="k">OBI</div><div class="v" id="mobi">–</div></div>
    <div class="m"><div class="k">OFI</div><div class="v" id="mofi">–</div></div>
    <div class="m"><div class="k">σ</div><div class="v" id="msigma">–</div></div>
  </div>
  <div id="logbox"><div class="k">◢ JOURNAL TOKYO</div><div id="log"></div></div>
</div>
<div id="toasts"></div>
<script src="/radar.js"></script>
</body>
</html>
